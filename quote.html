<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ODE · 견적서</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;scrollbar-width:thin;scrollbar-color:#3a3a46 transparent}
*::-webkit-scrollbar{width:7px;height:7px}*::-webkit-scrollbar-thumb{background:#3a3a46;border-radius:4px}
:root{--Y:#3D8EF0;--pink:#ff6fae;--green:#34d399;--bg:#1A1A22;--bg2:#22222c;--bg3:#2a2a36;--border:rgba(255,255,255,.12);--text:#F0EEE8;--text2:#B8B4AC;--text3:#7A7870;--display:'Bebas Neue',sans-serif;--cond:'Barlow Condensed',sans-serif;--mono:'DM Mono',monospace;--kr:'Noto Sans KR',sans-serif}
body{font-family:var(--kr);background:var(--bg);color:var(--text);line-height:1.5;padding:0 0 60px}
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;padding:13px 20px;background:rgba(26,26,34,.97);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.tb-title{font-family:var(--display);font-size:20px;letter-spacing:1.5px;color:var(--Y)}
.tb-sub{font-family:var(--cond);font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.5px}
.tb-spacer{flex:1}
.btn{border:none;border-radius:9px;font-family:var(--cond);font-weight:700;font-size:14px;letter-spacing:.4px;padding:9px 17px;cursor:pointer;transition:all .15s}
.btn-dl{background:linear-gradient(135deg,var(--Y),#2c6fc4);color:#fff;box-shadow:0 4px 14px rgba(61,142,240,.3)}
.btn-dl:hover{transform:translateY(-1px)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--Y)}
.wrap{max-width:840px;margin:0 auto;padding:20px 0;display:grid;grid-template-columns:1fr 410px;gap:20px;align-items:start}
@media(max-width:760px){.wrap{grid-template-columns:1fr}}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px}
.panel-h{font-family:var(--cond);font-size:16px;font-weight:900;letter-spacing:.4px;margin-bottom:14px;display:flex;align-items:center;gap:7px}
label.fl{display:block;font-family:var(--cond);font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--text3);text-transform:uppercase;margin:0 0 5px}
input.f,select.f,textarea.f{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:var(--kr);font-size:13px;outline:none;margin-bottom:11px}
input.f:focus,select.f:focus,textarea.f:focus{border-color:var(--Y)}
textarea.f{resize:vertical;min-height:50px;font-family:var(--mono);font-size:12px;line-height:1.6}
.li-row{display:grid;grid-template-columns:1fr 100px 30px;gap:6px;margin-bottom:6px}
.li-row input{margin-bottom:0;font-size:12px;padding:7px 9px}
.mini{font-family:var(--cond);font-size:12px;font-weight:700;border:none;border-radius:7px;padding:6px 11px;cursor:pointer}
.mini-add{background:rgba(61,142,240,.15);color:var(--Y);border:1px dashed var(--Y);width:100%;margin-top:4px}
.mini-del{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.3)}
.preview-wrap{position:sticky;top:74px}
.qhint{font-size:11px;color:var(--text3);margin-top:8px;font-family:var(--kr);line-height:1.5}
canvas{width:100%;height:auto;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.4);display:block}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-title">QUOTE</div><div class="tb-sub">견적서 생성</div>
  <div class="tb-spacer"></div>
  <button class="btn btn-ghost" onclick="render()">↻ 미리보기</button>
  <select id="qFmt" class="btn btn-ghost" style="padding:9px 12px;cursor:pointer;"><option value="png">PNG</option><option value="pdf">PDF</option></select>
  <button class="btn btn-dl" onclick="download()">⬇ 저장</button>
</div>
<div class="wrap">
  <div>
    <div class="panel">
      <div class="panel-h">📋 의뢰 불러오기</div>
      <label class="fl">대시보드에서 선택</label>
      <select class="f" id="commPick" onchange="loadComm()"><option value="">— 직접 입력 —</option></select>
      <div class="qhint">대시보드에 등록된 의뢰를 고르면 자동으로 채워져요.<br>없으면 아래에서 직접 입력하세요.</div>
    </div>
    <div class="panel" style="margin-top:14px">
      <div class="panel-h">✏ 견적 내용</div>
      <label class="fl">받는 분 (닉네임)</label><input class="f" id="qClient" value="" oninput="render()" placeholder="클라이언트 닉네임">
      <label class="fl">제목 / 유형</label><input class="f" id="qType" value="Live2D 일러스트 의뢰" oninput="render()">
      <label class="fl">항목</label>
      <div id="liBox"></div>
      <button class="mini mini-add" onclick="addLi()">＋ 항목 추가</button>
      <label class="fl" style="margin-top:13px">비고 (선택)</label>
      <textarea class="f" id="qNote" oninput="render()" placeholder="입금 계좌, 작업 기간 등"></textarea>
    </div>
  </div>
  <div class="preview-wrap">
    <canvas id="cv" width="920" height="1000"></canvas>
    <div class="qhint" style="text-align:center">⬆ 미리보기 · PNG/PDF 선택 후 "저장"</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
var STAGES=['접수','입금확인','러프','러프컨펌','선화','채색','완성','전달완료'];
var lis=[{n:'전신 일러스트',p:1100000}];
function won(n){return Number(n||0).toLocaleString('en-US');}
function loadCommList(){
  var raw;try{raw=JSON.parse(localStorage.getItem('ode_dash_v1')||'[]');}catch(e){raw=[];}
  var C=Array.isArray(raw)?raw:(raw.commissions||[]);
  var sel=document.getElementById('commPick');
  C.forEach(function(c,i){var o=document.createElement('option');o.value=i;o.textContent=(c.client||'무명')+' · '+(c.type||'')+(c.amount?' ('+won(c.amount)+'원)':'');sel.appendChild(o);});
  window._C=C;
}
function loadComm(){
  var i=document.getElementById('commPick').value;
  if(i===''){return;}
  var c=window._C[parseInt(i)];if(!c)return;
  document.getElementById('qClient').value=c.client||'';
  document.getElementById('qType').value=c.type||'Live2D 일러스트 의뢰';
  // parse line items from note/memo if available, else single amount
  lis=[];
  var note=c.note||'';
  // note format from parser: "기본 일러스트: X / 추가: Y ..."
  if(note && note.indexOf('/')>=0){
    note.split('/').forEach(function(part){var t=part.trim();if(t)lis.push({n:t.replace(/^[^:]*:\s*/,'').slice(0,60),p:0});});
  }
  if(c.amount){ if(lis.length){lis[0].p=parseInt(c.amount);} else {lis.push({n:c.type||'일러스트',p:parseInt(c.amount)});} }
  if(!lis.length)lis=[{n:'일러스트',p:0}];
  document.getElementById('qNote').value=c.email&&c.email!=='디스코드'?('파일 수령: '+c.email):'';
  renderLi();render();
}
function renderLi(){
  var h='';
  lis.forEach(function(l,i){
    h+='<div class="li-row"><input value="'+(l.n||'').replace(/"/g,'&quot;')+'" oninput="lis['+i+'].n=this.value;render()" placeholder="항목명"><input type="number" value="'+(l.p||0)+'" oninput="lis['+i+'].p=parseInt(this.value)||0;render()" placeholder="0" style="text-align:right;font-family:var(--mono)"><button class="mini mini-del" onclick="lis.splice('+i+',1);renderLi();render()">×</button></div>';
  });
  document.getElementById('liBox').innerHTML=h;
}
function addLi(){lis.push({n:'',p:0});renderLi();render();}

function render(){
  var cv = document.getElementById('cv'), x = cv.getContext('2d');
  var W = 920, pad = 100;
  var H = 320 + lis.length * 60 + (document.getElementById('qNote').value ? 120 : 60) + 120;
  cv.width = W;
  cv.height = H;

  /* ==========================
     Color
  ========================== */
  var C = {
    black: "#111111",
    dark: "#222222",
    text: "#333333",
    gray: "#666666",
    light: "#999999",
    line: "#e8e8e8",
    bg: "#f5f5f5",
    white: "#ffffff"
  };

  /* ==========================
     Background
  ========================== */
  x.fillStyle = C.white;
  x.fillRect(0, 0, W, H);

  /* Top Bar */
  x.fillStyle = C.black;
  x.fillRect(0, 10, W, 8);

  /* ==========================
     Header
  ========================== */
  x.fillStyle = C.black;
  x.font = '46px "Bebas Neue",sans-serif';
  x.fillText("ODE", pad, 82);

  x.fillStyle = C.gray;
  x.font = '600 20px "Noto Sans KR",sans-serif';
  x.fillText("ESTIMATE", pad, 110);

  var today = new Date();
  var ds = today.getFullYear() + "." + ("0" + (today.getMonth() + 1)).slice(-2) + "." + ("0" + today.getDate()).slice(-2);

  x.textAlign = "right";
  x.fillStyle = C.light;
  x.font = '500 20px "DM Mono",monospace';
  x.fillText(ds, W - pad, 90);
  x.textAlign = "left";

  /* Divider */
  x.strokeStyle = C.line;
  x.lineWidth = 2;

  x.beginPath();
  x.moveTo(pad, 130);
  x.lineTo(W - pad, 130);
  x.stroke();

  /* ==========================
     Client
  ========================== */

  var y = 170;
  x.fillStyle = C.gray;
  x.font = '700 18px "Noto Sans KR",sans-serif';
  x.fillText("받는 분", pad + 10, y);

  x.fillStyle = C.black;
  x.font = '700 20px "Noto Sans KR",sans-serif';
  x.fillText(document.getElementById("qClient").value || "—", pad + 120, y);

  y += 34;

  x.fillStyle = C.gray;
  x.font = '700 18px "Noto Sans KR",sans-serif';
  x.fillText("의뢰 내용", pad + 10, y);

  x.fillStyle = C.black;
  x.font = '600 20px "Noto Sans KR",sans-serif';
  x.fillText(document.getElementById("qType").value || "", pad + 120, y);

  y += 60;

  /* ==========================
     Table Header
  ========================== */

  x.fillStyle = C.bg;
  x.fillRect(pad, y - 22, W - pad * 2, 40);

  x.fillStyle = C.black;
  x.font = '700 18px "Noto Sans KR",sans-serif';
  x.fillText("항목", pad + 14, y+5);

  x.textAlign = "right";
  x.fillText("금액", W - pad - 14, y+5);
  x.textAlign = "left";

  y += 55;

  /* ==========================
     Items
  ========================== */

  var total = 0;

  lis.forEach(function (l) {
    x.fillStyle = C.text;
    x.font = '500 18px "Noto Sans KR",sans-serif';

    var name = l.n || "—";
    if (name.length > 34) {name = name.slice(0, 33) + "…";}
    x.fillText("• " + name, pad + 10, y);
    x.textAlign = "right";
    x.fillStyle = C.black;
    x.font = '700 18px "Noto Sans KR",sans-serif';
    x.fillText(won(l.p) + "원", W - pad - 12, y);
    x.textAlign = "left";
    total += Number(l.p || 0);
    y += 24;
    x.strokeStyle = C.line;
    x.beginPath();
    x.moveTo(pad, y);
    x.lineTo(W - pad, y);
    x.stroke();
    y += 30;
  });

  /* ==========================
     Total
  ========================== */
  y += 8;
  x.fillStyle = C.black;
  x.fillRect(pad, y - 28, W - pad * 2, 50);
  x.fillStyle = C.white;
  x.font = '700 22px "Noto Sans KR",sans-serif';
  x.fillText("합계 금액", pad + 18, y + 3);
  x.textAlign = "right";
  x.font = '800 22px "Noto Sans KR",sans-serif';
  x.fillText(won(total) + "원", W - pad - 18, y + 5);
  x.textAlign = "left";
  y += 72;

  /* ==========================
     Note
  ========================== */
  var note = document.getElementById("qNote").value;
  if (note) {
    x.fillStyle = C.black;
    x.font = '700 18px "Noto Sans KR",sans-serif';
    x.fillText("비고", pad, y);
    y += 24;
    x.fillStyle = C.gray;
    x.font = '500 18px "Noto Sans KR",sans-serif';
    note.split("\n").forEach(function (line) {
      x.fillText(line.slice(0, 46), pad, y);
      y += 20;
    });
    y += 10;
  }

  /* ==========================
     Footer
  ========================== */
  x.strokeStyle = C.line;
  x.beginPath();
  x.moveTo(pad, H - 62);
  x.lineTo(W - pad, H - 62);
  x.stroke();

  x.fillStyle = C.light;
  x.font = '500 13px "Noto Sans KR",sans-serif';
  x.fillText("본 견적서는 참고용이며 옵션 협의에 따라 금액이 변경될 수 있습니다.", pad, H - 36);

  x.textAlign = "right";
  x.fillStyle = C.black;
  x.font = '700 13px "DM Mono",monospace';
  x.fillText("ODE", W - pad, H - 36);
  x.textAlign = "left";
}
function download(){
  render();
  var cv=document.getElementById('cv');
  var name='ODE_견적서_'+(document.getElementById('qClient').value||'견적');
  var fmt=(document.getElementById('qFmt')||{}).value||'png';
  if(fmt==='pdf'){
    if(!window.jspdf||!window.jspdf.jsPDF){ alert('PDF 모듈 로딩 중이에요. 잠시 후 다시 시도해주세요.'); return; }
    var img = cv.toDataURL("image/png", 1.0);
    var pdf = new window.jspdf.jsPDF({orientation:'portrait', unit:'mm', format:'a4'});

    // 이미지 크기 정보를 구함
    var image_prop = pdf.getImageProperties(img);
    // console.log("image width/height = " + image_prop.width + ", " + image_prop.height);

    // PDF 문서 페이지 크기 정보
    // console.log("pdf page width/height = " + pdf.internal.pageSize.getWidth() + ", " + pdf.internal.pageSize.getHeight());

    // 이미지 크기를 그대로 처리 예시 (1px = 0.2645833333 mm)
    // var pdf_image_width = image_prop.width * 0.2645833333;
    // var pdf_image_height = image_prop.height * 0.2645833333;

    // 이미지 너비를 페이지 크기에 맞춤 처리 예시
    var pdf_image_width = pdf.internal.pageSize.getWidth() - 10;
    var pdf_image_height = (image_prop.height * pdf_image_width) / image_prop.width;

    pdf.addImage(img, "PNG", 5, 0, pdf_image_width, pdf_image_height);
    pdf.save(name+'.pdf');
    return;
  }
  cv.toBlob(function(b){
    var a=document.createElement('a');a.href=URL.createObjectURL(b);
    a.download=name+'.png';
    a.click();setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
  });
}
loadCommList();renderLi();
// wait for fonts then render
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(render);}
setTimeout(render,400);
</script>
</body>
</html>
